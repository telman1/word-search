# Blueprint: https://render.com/docs/blueprint-spec
#
# Push-to-prod: connect this repo once in Render (Blueprint), then enable branch deploys.
# After the first apply, every push to `main` rebuilds both services (autoDeployTrigger: commit).
#
# URLs below MUST match the `name` fields of each web service (https://<name>.onrender.com).
# If you rename a service, update CORS_ORIGIN / NEXT_PUBLIC_API_BASE_URL accordingly.

databases:
  - name: word-search-db
    region: oregon
    plan: free # use basic-256mb or higher if `free` is unavailable in your workspace

services:
  - type: web
    name: word-search-backend
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: backend-strapi
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 1337
      - key: DATABASE_CLIENT
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: word-search-db
          property: connectionString
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: APP_KEYS
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      # Comma-separated; add custom domains here. *.vercel.app is covered by CORS_ALLOW_VERCEL (see middlewares.js).
      - key: CORS_ORIGIN
        value: https://word-search-frontend.onrender.com
      # Allow browser requests from Vercel (preview + production *.vercel.app). Code also defaults this to true if unset.
      - key: CORS_ALLOW_VERCEL
        value: "true"

  - type: web
    name: word-search-frontend
    runtime: node
    plan: starter
    region: oregon
    branch: main
    autoDeployTrigger: commit
    rootDir: frontend-next
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://word-search-backend.onrender.com
